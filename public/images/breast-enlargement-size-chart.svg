      .cc-label { font: 14px Arial; fill: #555; }
      .side-label { font: 12px Arial; fill: #666; }
      .figure-outline { fill: #f5d5c3; stroke: #d4a574; stroke-width: 2; }
      .clothing { fill: #4a5568; }
      .clothing-blue { fill: #7fb3d5; }
      .clothing-green { fill: #81c784; }
      .clothing-black { fill: #2d3748; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="title">BREAST ENLARGEMENT</text>
  
  <!-- Side label -->
  <text x="1300" y="100" text-anchor="start" class="side-label">BREAST SIZE</text>
  <text x="1300" y="120" text-anchor="start" class="side-label">(CUP)</text>
  
